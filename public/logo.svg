<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1" stroke="url(#grad1)" stroke-width="1"/>
  
  <!-- Main logo shape - Book with checkmark -->
  <g filter="url(#glow)">
    <!-- Book pages -->
    <path d="M 60 50 L 70 60 L 70 140 L 60 140 Z" fill="url(#grad1)" stroke="url(#grad1)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 70 60 L 130 60 L 130 140 L 70 140 Z" fill="url(#grad2)" stroke="url(#grad2)" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Checkmark inside book -->
    <g transform="translate(100, 100)">
      <circle r="35" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
      <!-- Checkmark path -->
      <path d="M -15 0 L -5 10 L 15 -10" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Decorative lines (representing exam questions) -->
    <line x1="80" y1="75" x2="115" y2="75" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="90" x2="115" y2="90" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="105" x2="110" y2="105" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="120" x2="115" y2="120" stroke="white" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Outer ring accent -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  
  <!-- Sparkle effects -->
  <circle cx="140" cy="60" r="4" fill="url(#grad2)" opacity="0.8"/>
  <circle cx="60" cy="150" r="3" fill="url(#grad1)" opacity="0.6"/>
  <circle cx="150" cy="130" r="2.5" fill="url(#grad2)" opacity="0.5"/>
</svg>